name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  IMAGE_NAME: booknexus:${{ github.sha }}

jobs:
  validate-line-endings:
    name: Validate line endings
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Require LF line endings and a final newline in project source files
        run: |
          python - <<'PY'
          import subprocess
          from pathlib import Path

          files = subprocess.check_output(["git", "ls-files", "-z"]).split(b"\0")
          source_extensions = {".css", ".html", ".js", ".md", ".py", ".txt", ".yaml", ".yml"}
          excluded_prefixes = ("static/img/", "static/vendor/")
          invalid_files = []
          for raw_path in files:
              if not raw_path:
                  continue
              path = Path(raw_path.decode())
              project_path = path.as_posix()
              if project_path.startswith(excluded_prefixes) or path.suffix not in source_extensions:
                  continue
              content = path.read_bytes()
              if b"\0" in content:
                  continue
              if b"\r\n" in content or b"\r" in content or (content and not content.endswith(b"\n")):
                  invalid_files.append(str(path))
          if invalid_files:
              raise SystemExit("Files must use LF and end with a newline:\n" + "\n".join(invalid_files))
          PY

  validate-commits:
    name: Validate Conventional Commit messages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out complete history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require Conventional Commits with a body
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess

          header_pattern = re.compile(
              r"^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)"
              r"(\([a-z0-9][a-z0-9._/-]*\))?!?: .+"
          )
          if os.environ["EVENT_NAME"] == "pull_request":
              commit_range = f"{os.environ['BASE_SHA']}..{os.environ['HEAD_SHA']}"
          elif os.environ["BEFORE_SHA"] and set(os.environ["BEFORE_SHA"]) != {"0"}:
              commit_range = f"{os.environ['BEFORE_SHA']}..{os.environ['HEAD_SHA']}"
          else:
              commit_range = "HEAD"
          commits = subprocess.check_output(
              ["git", "log", "--format=%H%x00%B%x00%x00", commit_range], text=True
          ).split("\0\0\n")
          failures = []
          for commit in commits:
              if not commit.strip() or "\0" not in commit:
                  continue
              sha, message = commit.split("\0", 1)
              lines = message.strip().splitlines()
              header = lines[0] if lines else ""
              body = [line for line in lines[1:] if line.strip()]
              if not header_pattern.fullmatch(header) or not body:
                  failures.append(f"{sha[:7]}: {header!r}")
          if failures:
              raise SystemExit("Each commit needs a Conventional Commit header and a non-empty body:\n" + "\n".join(failures))
          PY

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install application and lint dependencies
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements-dev.lock
      - name: Run Ruff without modifying files
        run: ruff check . --output-format=github

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install application and typing dependencies
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements-dev.lock
      - name: Run mypy
        run: mypy --config-file mypy.ini --ignore-missing-imports accounts analytics book newsletter readinglists reports BookNexus

  sast:
    name: Static application security testing
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install Semgrep
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements-dev.lock
      - name: Scan Python and Django rules
        run: semgrep scan --config p/python --config p/django --error

  secrets:
    name: Scan repository secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Audit dependencies and licenses
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install audit tooling
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements-dev.lock
      - name: Detect known dependency vulnerabilities
        run: pip-audit --requirement requirements.lock
      - name: Enforce license policy and write report
        run: pip-licenses --fail-on="GPL-3.0;AGPL-3.0"

  migration-check:
    name: Validate Django migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
      DJANGO_DEBUG: "false"
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install application dependencies
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements.lock
      - name: Check Django configuration
        run: python manage.py check
      - name: Ensure migrations are committed
        run: python manage.py makemigrations --check --dry-run
      - name: Apply migrations to an empty database
        run: python manage.py migrate --noinput
      - name: Ensure no migrations remain pending
        run: python manage.py migrate --check

  unit-and-coverage:
    name: Unit tests and coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DJANGO_SETTINGS_MODULE: BookNexus.settings_testing
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install locked test dependencies
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements-dev.lock
      - name: Run unit tests with branch coverage
        run: python -m coverage run --branch manage.py test
      - name: Enforce minimum coverage
        run: python -m coverage report --fail-under=85
      - name: Generate coverage reports
        if: ${{ hashFiles('.coverage') != '' }}
        run: |
          python -m coverage html
          python -m coverage xml
      - name: Publish coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore
          retention-days: 30

  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs: unit-and-coverage
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out complete history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: .
      - name: Scan with SonarCloud
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: SonarSource/sonarqube-scan-action@1a6d90ebcb0e6a6b1d87e37ba693fe453195ae25 # v5.3.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Explain skipped external pull request scan
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: echo "SonarCloud is skipped because repository secrets are unavailable to external pull requests."

  # Future independent stages: unit-tests, coverage, integration-tests,
  # contract-tests, api-tests, and end-to-end-tests.

  build:
    name: Compile and package application
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - validate-line-endings
      - validate-commits
      - lint
      - type-check
      - sast
      - secrets
      - dependency-audit
      - migration-check
      - unit-and-coverage
      - sonarcloud
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install application dependencies
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements.lock
      - name: Compile Python modules
        run: python -m compileall -q accounts analytics book newsletter readinglists reports BookNexus
  docker-build-and-scan:
    name: Build, scan, and publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx cache
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build Docker image with layer cache
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan high and critical image vulnerabilities
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.70.0 \
            image --exit-code 1 --ignore-unfixed --severity HIGH,CRITICAL "${{ env.IMAGE_NAME }}"
      - name: Authenticate with GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish scanned image to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_IMAGE: ghcr.io/${{ github.repository }}
        run: |
          ghcr_image="${GHCR_IMAGE,,}"
          docker tag "$IMAGE_NAME" "$ghcr_image:$GITHUB_SHA"
          docker tag "$IMAGE_NAME" "$ghcr_image:latest"
          docker push "$ghcr_image:$GITHUB_SHA"
          docker push "$ghcr_image:latest"

  publish-artifacts:
    name: Publish GitHub build artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [build, docker-build-and-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python for license artifact
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Generate license report
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements-dev.lock
          pip-licenses --format=json --output-file=licenses.json
      - name: Create source artifact
        run: |
          tar --exclude-vcs --exclude='.venv' --exclude='venv' --exclude='media' \
            -czf "$RUNNER_TEMP/booknexus-source.tar.gz" .
      - name: Publish source artifact
        uses: actions/upload-artifact@v4
        with:
          name: booknexus-source
          path: ${{ runner.temp }}/booknexus-source.tar.gz
          retention-days: 30
      - name: Publish license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json
          retention-days: 30

  notify-failure:
    name: Notify failures
    runs-on: ubuntu-latest
    needs: [validate-line-endings, validate-commits, lint, type-check, sast, secrets, dependency-audit, migration-check, unit-and-coverage, sonarcloud, build, docker-build-and-scan, publish-artifacts]
    if: ${{ failure() }}
    steps:
      - name: Write failure summary
        run: |
          echo "## CI/CD failed" >> "$GITHUB_STEP_SUMMARY"
          echo "Review: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> "$GITHUB_STEP_SUMMARY"
      - name: Send optional webhook notification
        env:
          WEBHOOK_URL: ${{ secrets.FAILURE_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "FAILURE_WEBHOOK_URL is not configured; skipping external notification."
            exit 0
          fi
          curl --fail --silent --show-error --request POST "$WEBHOOK_URL" \
            --header 'Content-Type: application/json' \
            --data "{\"text\":\"BookNexus CI/CD failed: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
