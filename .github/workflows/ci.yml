name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  IMAGE_NAME: booknexus:${{ github.sha }}

jobs:
  validate-line-endings:
    name: Line Endings
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Require LF line endings and a final newline in project source files
        run: |
          python - <<'PY'
          import subprocess
          from pathlib import Path

          files = subprocess.check_output(["git", "ls-files", "-z"]).split(b"\0")
          source_extensions = {".css", ".html", ".js", ".md", ".py", ".txt", ".yaml", ".yml"}
          excluded_prefixes = ("static/img/", "static/vendor/")
          invalid_files = []
          for raw_path in files:
              if not raw_path:
                  continue
              path = Path(raw_path.decode())
              project_path = path.as_posix()
              if project_path.startswith(excluded_prefixes) or path.suffix not in source_extensions:
                  continue
              content = path.read_bytes()
              if b"\0" in content:
                  continue
              if b"\r\n" in content or b"\r" in content or (content and not content.endswith(b"\n")):
                  invalid_files.append(str(path))
          if invalid_files:
              raise SystemExit("Files must use LF and end with a newline:\n" + "\n".join(invalid_files))
          PY

  validate-commits:
    name: Commit Messages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out complete history
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      - name: Require Conventional Commits with a body
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess

          header_pattern = re.compile(
              r"^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)"
              r"(\([a-z0-9][a-z0-9._/-]*\))?!?: .+"
          )
          if os.environ["EVENT_NAME"] == "pull_request":
              commit_range = f"{os.environ['BASE_SHA']}..{os.environ['HEAD_SHA']}"
          elif os.environ["BEFORE_SHA"] and set(os.environ["BEFORE_SHA"]) != {"0"}:
              commit_range = f"{os.environ['BEFORE_SHA']}..{os.environ['HEAD_SHA']}"
          else:
              commit_range = "HEAD"
          commits = subprocess.check_output(
              ["git", "log", "--format=%H%x00%B%x00%x00", commit_range], text=True
          ).split("\0\0\n")
          failures = []
          for commit in commits:
              if not commit.strip() or "\0" not in commit:
                  continue
              sha, message = commit.split("\0", 1)
              lines = message.strip().splitlines()
              header = lines[0] if lines else ""
              body = [line for line in lines[1:] if line.strip()]
              if not header_pattern.fullmatch(header) or not body:
                  failures.append(f"{sha[:7]}: {header!r}")
          if failures:
              raise SystemExit("Each commit needs a Conventional Commit header and a non-empty body:\n" + "\n".join(failures))
          PY

  configuration-validation:
    name: Configuration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install configuration validation tools
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements-dev.lock
      - name: Validate YAML files
        run: git ls-files -z -- '*.yaml' '*.yml' | xargs -0 yamllint
      - name: Validate GitHub Actions workflows
        uses: reviewdog/action-actionlint@e0207a28405ecad11953ba625a95d92f7889572a # v1
        with:
          reporter: github-check
          fail_level: error
      - name: Validate Docker Compose when configured
        run: |
          for compose_file in compose.yml compose.yaml docker-compose.yml docker-compose.yaml; do
            if [ -f "$compose_file" ]; then
              docker compose --file "$compose_file" config --quiet
            fi
          done
      - name: Validate TOML, INI, JSON, and environment example files
        run: |
          python - <<'PY'
          import configparser
          import json
          import re
          import subprocess
          import tomllib
          from pathlib import Path

          tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))

          for config_file in ("mypy.ini", ".coveragerc"):
              parser = configparser.ConfigParser()
              if not parser.read(config_file, encoding="utf-8"):
                  raise SystemExit(f"Unable to parse {config_file}.")

          for raw_path in subprocess.check_output(
              ["git", "ls-files", "*.json"], text=True
          ).splitlines():
              json.loads(Path(raw_path).read_text(encoding="utf-8"))

          environment_key = re.compile(r"^[A-Z][A-Z0-9_]*$")
          for line_number, line in enumerate(
              Path(".env.example").read_text(encoding="utf-8").splitlines(), start=1
          ):
              stripped_line = line.strip()
              if not stripped_line or stripped_line.startswith("#"):
                  continue
              if "=" not in line:
                  raise SystemExit(f".env.example:{line_number} must use KEY=value syntax.")
              key, _ = line.split("=", maxsplit=1)
              if not environment_key.fullmatch(key):
                  raise SystemExit(f".env.example:{line_number} has an invalid key: {key!r}.")
          PY

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install application and lint dependencies
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements-dev.lock
      - name: Run Ruff linting
        run: ruff check . --output-format=github
      - name: Check Ruff formatting
        run: ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install application and typing dependencies
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements-dev.lock
      - name: Run mypy
        run: mypy --config-file mypy.ini --ignore-missing-imports accounts analytics book newsletter readinglists reports BookNexus

  sast:
    name: SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install Semgrep
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements-dev.lock
      - name: Scan Python and Django rules
        run: semgrep scan --config p/python --config p/django --error

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install audit tooling
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements-dev.lock
      - name: Detect known dependency vulnerabilities
        run: pip-audit --requirement requirements.lock
      - name: Enforce license policy and generate report
        run: |
          pip-licenses --fail-on="GPL-3.0;AGPL-3.0" --format=json \
            --output-file=licenses.json
      - name: Publish license report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: license-report
          path: licenses.json
          retention-days: 30

  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production
      DJANGO_DEBUG: "false"
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install application dependencies
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements.lock
      - name: Check Django configuration
        run: python manage.py check
      - name: Ensure migrations are committed
        run: python manage.py makemigrations --check --dry-run
      - name: Apply migrations to an empty database
        run: python manage.py migrate --noinput
      - name: Ensure no migrations remain pending
        run: python manage.py migrate --check

  unit-and-coverage:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DJANGO_SETTINGS_MODULE: BookNexus.settings_testing
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install locked test dependencies
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements-dev.lock
      - name: Run unit tests with branch coverage
        run: python -m coverage run --branch manage.py test --exclude-tag=integration
      - name: Enforce minimum coverage
        run: python -m coverage report --fail-under=85
      - name: Generate coverage reports
        if: ${{ hashFiles('.coverage') != '' }}
        run: |
          python -m coverage html
          python -m coverage xml
      - name: Publish coverage reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore
          retention-days: 30

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-and-coverage
    permissions:
      contents: read
    env:
      DJANGO_SETTINGS_MODULE: BookNexus.settings_testing
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install locked test dependencies
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements-dev.lock
      - name: Run tagged integration tests
        run: python manage.py test --tag=integration

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: unit-and-coverage
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out complete history
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-reports
          path: .
      - name: Scan with SonarCloud
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: SonarSource/sonarqube-scan-action@1a6d90ebcb0e6a6b1d87e37ba693fe453195ae25 # v5.3.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Explain skipped external pull request scan
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: echo "SonarCloud is skipped because repository secrets are unavailable to external pull requests."

  # Future stages: contract-tests, api-tests, and end-to-end-tests.

  build:
    name: Python Compilation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - validate-line-endings
      - validate-commits
      - lint
      - type-check
      - sast
      - secrets
      - dependency-audit
      - migration-check
      - unit-and-coverage
      - integration-tests
      - sonarcloud
      - configuration-validation
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install application dependencies
        run: |
          python -m pip install --only-binary=:all: --require-hashes --requirement requirements.lock
      - name: Compile Python modules
        run: python -m compileall -q accounts analytics book newsletter readinglists reports BookNexus
  docker-build-and-scan:
    name: Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    needs: build
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Docker Buildx cache
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Scan filesystem and Docker configuration
        run: |
          docker run --rm -v "$PWD:/workspace:ro" aquasec/trivy:0.70.0 \
            fs --exit-code 1 --severity HIGH,CRITICAL \
            --scanners vuln,secret,misconfig /workspace
      - name: Build Docker image with layer cache
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}
          build-args: |
            SOURCE_URL=https://github.com/${{ github.repository }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Ensure container runs as a non-root user
        run: |
          container_user="$(docker inspect --format='{{.Config.User}}' "${{ env.IMAGE_NAME }}")"
          if [ -z "$container_user" ] || [ "$container_user" = "0" ] || [ "$container_user" = "root" ]; then
            echo "Container must run as a non-root user."
            exit 1
          fi
      - name: Validate image runtime metadata
        run: |
          healthcheck="$(docker inspect --format='{{if .Config.Healthcheck}}configured{{end}}' "${{ env.IMAGE_NAME }}")"
          if [ "$healthcheck" != "configured" ]; then
            echo "Container must define a HEALTHCHECK."
            exit 1
          fi

          for label in org.opencontainers.image.source org.opencontainers.image.revision; do
            label_value="$(docker inspect --format="{{index .Config.Labels \"$label\"}}" "${{ env.IMAGE_NAME }}")"
            if [ -z "$label_value" ] || [ "$label_value" = "<no value>" ]; then
              echo "Container must define the OCI label: $label."
              exit 1
            fi
          done
      - name: Enforce Docker image size budget
        env:
          MAX_IMAGE_SIZE_MB: 500
        run: |
          image_size_bytes="$(docker image inspect --format='{{.Size}}' "${{ env.IMAGE_NAME }}")"
          max_size_bytes="$((MAX_IMAGE_SIZE_MB * 1024 * 1024))"
          if [ "$image_size_bytes" -gt "$max_size_bytes" ]; then
            echo "Image size exceeds the ${MAX_IMAGE_SIZE_MB} MB budget."
            exit 1
          fi
      - name: Scan high and critical image vulnerabilities
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.70.0 \
            image --exit-code 1 --ignore-unfixed --severity HIGH,CRITICAL "${{ env.IMAGE_NAME }}"
      - name: Start Docker container
        run: |
          docker run --detach \
            --name booknexus-ci \
            --publish 8000:8000 \
            --env DJANGO_SECRET_KEY=ci-only-secret \
            --env DJANGO_DEBUG=false \
            --env DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1 \
            "${{ env.IMAGE_NAME }}"
      - name: Wait for health endpoint
        run: |
          for attempt in {1..30}; do
            echo "Waiting for health endpoint (attempt $attempt/30)..."
            if curl --fail --silent --show-error http://127.0.0.1:8000/health/; then
              exit 0
            fi

            if [ "$(docker inspect --format='{{.State.Running}}' booknexus-ci 2>/dev/null || true)" != "true" ]; then
              docker logs booknexus-ci
              exit 1
            fi

            sleep 2
          done

          docker logs booknexus-ci
          exit 1
      - name: Stop test container
        if: always()
        run: docker rm --force booknexus-ci || true
      - name: Authenticate with GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish scanned image to GitHub Container Registry
        id: publish-image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_IMAGE: ghcr.io/${{ github.repository }}
        run: |
          ghcr_image="${GHCR_IMAGE,,}"
          docker tag "$IMAGE_NAME" "$ghcr_image:$GITHUB_SHA"
          docker tag "$IMAGE_NAME" "$ghcr_image:latest"
          push_output="$(docker push "$ghcr_image:$GITHUB_SHA")"
          printf '%s\n' "$push_output"
          docker push "$ghcr_image:latest"
          image_digest="$(printf '%s\n' "$push_output" | sed -n 's/.*digest: \(sha256:[0-9a-f]*\).*/\1/p' | tail -n 1)"
          if [ -z "$image_digest" ]; then
            echo "Unable to determine the published image digest."
            exit 1
          fi
          echo "name=$ghcr_image" >> "$GITHUB_OUTPUT"
          echo "digest=$image_digest" >> "$GITHUB_OUTPUT"
      - name: Attest published Docker image provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e # v4
        with:
          subject-name: ${{ steps.publish-image.outputs.name }}
          subject-digest: ${{ steps.publish-image.outputs.digest }}
          push-to-registry: true

  publish-artifacts:
    name: Publish Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [build, docker-build-and-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Create source artifact
        run: |
          tar --exclude-vcs --exclude='.venv' --exclude='venv' --exclude='media' \
            -czf "$RUNNER_TEMP/booknexus-source.tar.gz" .
      - name: Publish source artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: booknexus-source
          path: ${{ runner.temp }}/booknexus-source.tar.gz
          retention-days: 30

  notify-failure:
    name: Failure Notification
    runs-on: ubuntu-latest
    needs: [validate-line-endings, validate-commits, configuration-validation, lint, type-check, sast, secrets, dependency-audit, migration-check, unit-and-coverage, integration-tests, sonarcloud, build, docker-build-and-scan, publish-artifacts]
    if: >-
      ${{
        always() &&
        contains(needs.*.result, 'failure')
      }}
    steps:
      - name: Write failure summary
        run: |
          echo "## CI/CD failed" >> "$GITHUB_STEP_SUMMARY"
          echo "Review: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> "$GITHUB_STEP_SUMMARY"
      - name: Send optional webhook notification
        env:
          WEBHOOK_URL: ${{ secrets.FAILURE_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "FAILURE_WEBHOOK_URL is not configured; skipping external notification."
            exit 0
          fi
          curl --fail --silent --show-error --request POST "$WEBHOOK_URL" \
            --header 'Content-Type: application/json' \
            --data "{\"text\":\"BookNexus CI/CD failed: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
